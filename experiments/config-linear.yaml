# Experiment variables
experiment_name: "sync_freq-experiment"
client_type : 0 # 0: Random feature networks, 1: Transformer based clients, 2: Echo State Network clients
num_clients : 9 # The number of experts or clients
total_rounds : 200 # The number of total rounds
have_sync: True
sync_freq : 10 # Frequency in terms of time steps for doing synchronization (T)
d_z : 5 # The size of the hidden state (int)
alpha : 0.005 # alpha defines our emphasize on previous time steps in the local objective functions, and has direct relation with discounting factor.
gamma : 5 # gamma is the weight of weight regularization in the local objective functions.
sigma : 0.01 # level of randomness in generative models

# Data variables
data: "linear_line"  # periodic_signal or logistic_map, linear_line
n_samples: 1 # The number of sequences generated for the data
data_length: 201 # The size of each of the data samples

# Only used for transformer example:
# d_z should be divisible by number of heads in the model (now set to 4)
# Variables for pre-training the transformer models, and the dataset used
data_size: 32 # The number of data samples
batch_size: 10
# data_length is the same as used for online prediction
pre_training_lr: 0.001
pre_training_epochs: 10
