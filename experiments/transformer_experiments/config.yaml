# Experiment variables
experiment_name: "transformer-quadratic-2c"
client_type : 1 # 1: Pre-trained transformer model (fixed for this experiment)
data: "quadratic_data"  # periodic_signal, logistic_map, sine_signal, quadratic_data, linear_line, or horizontal_line, 2dxy, simple_brownian, brownian_addition

num_clients : 2 # The number of experts or clients
total_rounds : 200 # The number of total rounds (data sequence will be created to be one time-step longer)
have_sync: False # Do we want to have Nash game and synchronization steps or not
update_last_Y_sync: False # Do we want to update Y^i_{t-1} after we play the Nash game? This is used to compute w_t
save_plot: True