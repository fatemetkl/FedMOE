# Training variables
total_rounds : 499 # The number of total rounds (data sequence will be created to be one time-step longer)
models_dir: "experiments/transformer_experiments/ett_data/5_clients/models/" # The directory of saved the models
data_loader_num_samples: 100
data_loader_batch_size: 10
