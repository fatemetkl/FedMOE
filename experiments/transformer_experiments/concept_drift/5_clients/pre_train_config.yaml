# Training variables
total_rounds : 200 # The number of total rounds (data sequence will be created to be one time-step longer)
models_dir: "experiments/transformer_experiments/concept_drift/5_clients/models/" # The directory of saved the models
data_loader_num_samples: 100
data_loader_batch_size: 10
pre_training_epochs: 400
pre_training_learning_rate: 0.001
hidden_dim: 2 # should be multiple of 2

# Fixed config variables. DO NOT CHANGE.
data: "concept_drift"  # Dataset options are saved in utils.DataOptions.
num_clients : 5 # The number of experts or clients
