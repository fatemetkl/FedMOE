# Training variables
data: "periodic_signal"  # Dataset options are saved in utils.DataOptions. Examples: periodic_signal, time_input_periodic, logistic_map, sine_signal, quadratic_data, linear_line, or horizontal_line, 2dxy, simple_brownian, brownian_addition
num_clients : 10 # The number of experts or clients
total_rounds : 50 # The number of total rounds (data sequence will be created to be one time-step longer)
models_dir: "experiments/transformer_experiments/models/" # The directory of saved the models
data_loader_num_samples: 200
data_loader_batch_size: 10
# Periodic data: for 2c clients I ran each 400, 3c clients I ran each 200, for 5 client I ran each 100
# For 10 clients I ran each 100
pre_training_epochs: 100
pre_training_learning_rate: 0.001
hidden_dim: 8 # should be multiple of 4
