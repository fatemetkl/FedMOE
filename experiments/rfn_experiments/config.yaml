# Experiment variables
experiment_name: "rfn-experiment-sin"
client_type : 0 # 0: Random feature networks (fixed for this experiment)
# Data variables
data: "sine_signal"  # periodic_signal, logistic_map, sine_signal, quadratic_data, linear_line, or horizontal_line

num_clients : 4 # The number of experts or clients
total_rounds : 100 # The number of total rounds (data sequence will be created to be one time-step longer)
have_sync: True # Do we want to have Nash game and synchronization steps or not
update_last_Y_sync: True # Do we want to update Y^i_{t-1} after we play the Nash game? This is used to compute w_t
save_plot: True